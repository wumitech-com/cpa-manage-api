<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
      window.location.replace('/console-vue/login');
    </script>
  <title>TT Farm Console - 批量养号控制中心</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
    :root {
      --glass: rgba(255, 255, 255, 0.5);
      --glass-border: rgba(255, 255, 255, 0.65);
      --text: #6b4c5a;
      --text-muted: #a68a97;
      --accent: #f9a8d4;
      --accent-2: #fbcfe8;
      --accent-3: #fce7f3;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
      color: var(--text);
      background: 
        radial-gradient(ellipse 90% 60% at 50% -10%, rgba(249, 168, 212, 0.35), transparent 50%),
        radial-gradient(ellipse 70% 50% at 100% 30%, rgba(251, 207, 232, 0.4), transparent),
        radial-gradient(ellipse 60% 50% at 0% 70%, rgba(254, 240, 248, 0.5), transparent),
        linear-gradient(180deg, #fff5f9 0%, #fef7ff 30%, #fdf2f8 60%, #fce7f3 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* 樱花飘落容器 */
    .petals {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .petal {
      position: absolute;
      width: 12px;
      height: 12px;
      background: radial-gradient(ellipse 50% 50%, var(--accent-2), var(--accent));
      border-radius: 50% 50% 50% 0;
      transform: rotate(0deg);
      opacity: 0.7;
      animation: float-down linear infinite;
    }
    .petal:nth-child(1) { left: 5%; animation-duration: 12s; animation-delay: 0s; width: 10px; height: 10px; }
    .petal:nth-child(2) { left: 15%; animation-duration: 14s; animation-delay: 2s; width: 8px; height: 8px; }
    .petal:nth-child(3) { left: 25%; animation-duration: 11s; animation-delay: 1s; }
    .petal:nth-child(4) { left: 35%; animation-duration: 16s; animation-delay: 3s; width: 6px; height: 6px; }
    .petal:nth-child(5) { left: 45%; animation-duration: 13s; animation-delay: 0.5s; }
    .petal:nth-child(6) { left: 55%; animation-duration: 15s; animation-delay: 2.5s; width: 9px; height: 9px; }
    .petal:nth-child(7) { left: 65%; animation-duration: 12s; animation-delay: 1.5s; }
    .petal:nth-child(8) { left: 75%; animation-duration: 14s; animation-delay: 4s; width: 7px; height: 7px; }
    .petal:nth-child(9) { left: 85%; animation-duration: 11s; animation-delay: 0.8s; }
    .petal:nth-child(10) { left: 95%; animation-duration: 13s; animation-delay: 2.2s; width: 10px; height: 10px; }
    @keyframes float-down {
      0% { transform: translateY(-20px) rotate(0deg) translateX(0); opacity: 0; }
      10% { opacity: 0.7; }
      90% { opacity: 0.5; }
      100% { transform: translateY(100vh) rotate(720deg) translateX(30px); opacity: 0; }
    }

    /* 光晕呼吸 */
    .glow {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(249, 168, 212, 0.2) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: glow-pulse 4s ease-in-out infinite;
      z-index: 0;
    }
    .glow::before {
      content: '';
      position: absolute;
      inset: -80px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(251, 207, 232, 0.15) 0%, transparent 60%);
      animation: glow-pulse 4s ease-in-out infinite 1s;
    }
    @keyframes glow-pulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
    }

    /* 主内容区 */
    .landing {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 40px 80px;
    }

    /* Logo 区域 */
    .logo-wrap {
      margin-bottom: 36px;
      animation: logo-float 3s ease-in-out infinite;
    }
    @keyframes logo-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .logo-svg {
      width: 120px;
      height: 120px;
      margin: 0 auto 20px;
            display: block;
      filter: drop-shadow(0 8px 24px rgba(249, 168, 212, 0.35));
      animation: logo-glow 2.5s ease-in-out infinite;
    }
    @keyframes logo-glow {
      0%, 100% { filter: drop-shadow(0 8px 24px rgba(249, 168, 212, 0.35)); }
      50% { filter: drop-shadow(0 12px 32px rgba(249, 168, 212, 0.5)); }
    }
    .logo-title {
      font-family: 'Zen Kaku Gothic New', 'Outfit', sans-serif;
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      background: linear-gradient(135deg, #f472b6 0%, var(--accent) 35%, var(--accent-2) 70%, #fdf2f8 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradient-shift 5s ease infinite;
    }
    @keyframes gradient-shift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    .logo-sub {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-top: 8px;
      font-weight: 500;
    }

    /* 进入按钮 */
    .enter-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
      padding: 18px 42px;
      font-family: 'Outfit', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, var(--accent), #ec4899);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 8px 28px rgba(249, 168, 212, 0.45);
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }
    .enter-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.25), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .enter-btn:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 16px 40px rgba(249, 168, 212, 0.55);
    }
    .enter-btn:hover::before { opacity: 1; }
    .enter-btn:active { transform: translateY(-2px) scale(0.98); }
    .enter-btn .arrow {
      transition: transform 0.3s;
    }
    .enter-btn:hover .arrow {
      transform: translateX(6px);
    }

    /* 飘落爱心 */
    .hearts { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .heart {
      position: absolute;
      font-size: 14px;
      opacity: 0.5;
      animation: float-heart linear infinite;
    }
    .heart::before { content: '♥'; color: #f9a8d4; text-shadow: 0 0 8px rgba(249,168,212,0.6); }
    .heart:nth-child(1) { left: 8%; animation-duration: 18s; animation-delay: 0s; font-size: 12px; }
    .heart:nth-child(2) { left: 22%; animation-duration: 15s; animation-delay: 5s; font-size: 16px; }
    .heart:nth-child(3) { left: 38%; animation-duration: 20s; animation-delay: 2s; font-size: 10px; }
    .heart:nth-child(4) { left: 52%; animation-duration: 16s; animation-delay: 7s; font-size: 14px; }
    .heart:nth-child(5) { left: 68%; animation-duration: 19s; animation-delay: 3s; font-size: 11px; }
    .heart:nth-child(6) { left: 82%; animation-duration: 17s; animation-delay: 6s; font-size: 13px; }
    .heart:nth-child(7) { left: 92%; animation-duration: 14s; animation-delay: 4s; font-size: 15px; }
    @keyframes float-heart {
      0% { transform: translateY(-30px) translateX(0) scale(0.8); opacity: 0; }
      15% { opacity: 0.5; }
      85% { opacity: 0.3; }
      100% { transform: translateY(100vh) translateX(-20px) scale(1); opacity: 0; }
    }

    /* 闪烁星星 */
    .sparkles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .sparkle {
      position: absolute;
      width: 4px; height: 4px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 6px #fbcfe8, 0 0 12px rgba(251,207,232,0.5);
      animation: twinkle 2s ease-in-out infinite;
    }
    .sparkle:nth-child(1) { top: 15%; left: 10%; animation-delay: 0s; }
    .sparkle:nth-child(2) { top: 25%; left: 85%; animation-delay: 0.5s; }
    .sparkle:nth-child(3) { top: 60%; left: 5%; animation-delay: 1s; }
    .sparkle:nth-child(4) { top: 75%; left: 90%; animation-delay: 0.3s; }
    .sparkle:nth-child(5) { top: 40%; left: 95%; animation-delay: 1.2s; }
    .sparkle:nth-child(6) { top: 85%; left: 15%; animation-delay: 0.8s; }
    .sparkle:nth-child(7) { top: 10%; left: 50%; animation-delay: 0.2s; }
    .sparkle:nth-child(8) { top: 70%; left: 70%; animation-delay: 1.5s; }
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    /* 爱情文案区 - 单条轮播，避免重叠 */
    .quote-wrap {
      margin-top: 36px;
      min-height: 72px;
      position: relative;
      padding: 0 20px;
    }
    .quote {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 360px;
      font-size: 0.95rem;
      color: var(--text-muted);
      font-style: italic;
      line-height: 1.7;
      text-align: center;
      opacity: 0;
      transition: opacity 0.6s ease;
      pointer-events: none;
    }
    .quote.active {
      opacity: 1;
    }

    /* 按钮上方俏皮文案 */
    .btn-hint {
      margin-top: 40px;
      font-size: 0.8rem;
      color: var(--text-muted);
      opacity: 0.8;
      animation: hint-pulse 2s ease-in-out infinite;
    }
    @keyframes hint-pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* 底部小字 */
    .footer-tag {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      color: var(--text-muted);
      opacity: 0.6;
      z-index: 1;
    }

    /* 角标装饰 */
    .corner-deco {
      position: fixed;
      font-size: 0.7rem;
      color: var(--accent);
      opacity: 0.4;
      z-index: 1;
      font-style: italic;
    }
    .corner-deco.tl { top: 20px; left: 24px; }
    .corner-deco.tr { top: 20px; right: 24px; text-align: right; }
    .corner-deco.bl { bottom: 50px; left: 24px; }
    .corner-deco.br { bottom: 50px; right: 24px; text-align: right; }
  </style>
</head>
<body>
  <div class="petals">
    <span class="petal"></span><span class="petal"></span><span class="petal"></span>
    <span class="petal"></span><span class="petal"></span><span class="petal"></span>
    <span class="petal"></span><span class="petal"></span><span class="petal"></span>
    <span class="petal"></span>
                            </div>
  <div class="hearts">
    <span class="heart"></span><span class="heart"></span><span class="heart"></span>
    <span class="heart"></span><span class="heart"></span><span class="heart"></span>
    <span class="heart"></span>
                            </div>
  <div class="sparkles">
    <span class="sparkle"></span><span class="sparkle"></span><span class="sparkle"></span>
    <span class="sparkle"></span><span class="sparkle"></span><span class="sparkle"></span>
    <span class="sparkle"></span><span class="sparkle"></span>
                            </div>
  <div class="glow"></div>

  <div class="corner-deco tl">养号千千万，唯你不可替代 ♡</div>
  <div class="corner-deco tr">每一行代码都写着想你</div>
  <div class="corner-deco bl">想和你一起 debug 到天亮</div>
  <div class="corner-deco br">你是我的唯一 bug ♡</div>

  <div class="landing">
    <div class="logo-wrap">
      <svg class="logo-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <!-- 樱花花朵主体 -->
        <g transform="translate(60, 50)">
          <ellipse cx="0" cy="-18" rx="12" ry="18" fill="#fbcfe8" opacity="0.9" transform="rotate(0)"/>
          <ellipse cx="0" cy="-18" rx="12" ry="18" fill="#f9a8d4" opacity="0.95" transform="rotate(72)"/>
          <ellipse cx="0" cy="-18" rx="12" ry="18" fill="#fbcfe8" opacity="0.9" transform="rotate(144)"/>
          <ellipse cx="0" cy="-18" rx="12" ry="18" fill="#f9a8d4" opacity="0.95" transform="rotate(216)"/>
          <ellipse cx="0" cy="-18" rx="12" ry="18" fill="#fbcfe8" opacity="0.9" transform="rotate(288)"/>
          <circle cx="0" cy="0" r="8" fill="#fdf2f8"/>
          <circle cx="0" cy="0" r="4" fill="#f9a8d4"/>
        </g>
        <!-- TT 字母抽象 -->
        <text x="60" y="95" text-anchor="middle" font-family="Outfit, sans-serif" font-size="28" font-weight="700" fill="url(#ttGrad)">TT</text>
        <defs>
          <linearGradient id="ttGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#ec4899"/>
            <stop offset="50%" style="stop-color:#f9a8d4"/>
            <stop offset="100%" style="stop-color:#fbcfe8"/>
          </linearGradient>
        </defs>
      </svg>
      <h1 class="logo-title">TT Farm Console</h1>
      <p class="logo-sub">批量养号控制中心</p>
                            </div>
    <div class="quote-wrap">
      <p class="quote active">「养号不如养你，但养你之前先养号」</p>
      <p class="quote">「你的每一次点击，都是我的心动」</p>
      <p class="quote">「想和你一起，把每一个账号都养成小公主」</p>
      <p class="quote">「系统可以重启，但遇见你只有一次」</p>
      <p class="quote">「今天也要和 TT Farm 一起努力呀 ♡」</p>
      <p class="quote">「点我，我等你很久了」</p>
                            </div>
    <p class="btn-hint">↓ 点这里，解锁心动 ↓</p>
    <a href="/console-vue/" class="enter-btn">
      进入系统 ♡
      <svg class="arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </a>
                    </div>

  <p class="footer-tag">Made with ♡ for someone special</p>

  <script>
    (function() {
      var quotes = document.querySelectorAll('.quote');
      if (quotes.length === 0) return;
      var i = 0;
      setInterval(function() {
        quotes[i].classList.remove('active');
        i = (i + 1) % quotes.length;
        quotes[i].classList.add('active');
      }, 5000);
    })();
  </script>
</body>
</html>
