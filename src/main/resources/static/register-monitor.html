<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册脚本监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 30px;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #48bb78;
            color: white;
        }

        .btn-secondary:hover {
            background: #38a169;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(72, 187, 120, 0.4);
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .btn-danger:hover {
            background: #e53e3e;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-left: 10px;
        }

        .status-running {
            background: #bee3f8;
            color: #2c5282;
        }

        .status-completed {
            background: #c6f6d5;
            color: #22543d;
        }

        .status-error {
            background: #fed7d7;
            color: #742a2a;
        }

        .status-not-running {
            background: #e2e8f0;
            color: #4a5568;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .info-item {
            padding: 15px;
            background: #f7fafc;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .info-label {
            font-size: 12px;
            color: #718096;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-value {
            font-size: 16px;
            color: #2d3748;
            font-weight: 600;
        }

        .log-container {
            background: #1a202c;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            max-height: 500px;
            overflow-y: auto;
        }

        .log-content {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            color: #e2e8f0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .log-container::-webkit-scrollbar {
            width: 8px;
        }

        .log-container::-webkit-scrollbar-track {
            background: #2d3748;
            border-radius: 4px;
        }

        .log-container::-webkit-scrollbar-thumb {
            background: #4a5568;
            border-radius: 4px;
        }

        .log-container::-webkit-scrollbar-thumb:hover {
            background: #718096;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            padding: 12px;
            background: #edf2f7;
            border-radius: 8px;
        }

        .auto-refresh label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #4a5568;
        }

        .auto-refresh input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .refresh-interval {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-interval select {
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #cbd5e0;
            font-size: 14px;
            background: white;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #c6f6d5;
            color: #22543d;
            border-left: 4px solid #38a169;
        }

        .alert-error {
            background: #fed7d7;
            color: #742a2a;
            border-left: 4px solid #e53e3e;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🚀 注册脚本监控面板</h1>
            <p class="subtitle">实时监控注册脚本执行状态和日志输出</p>

            <div class="button-group">
                <button class="btn-primary" onclick="executeScript()">
                    <span id="executeBtn">执行注册脚本</span>
                </button>
                <button class="btn-secondary" onclick="refreshStatus()">
                    <span id="refreshBtn">刷新状态</span>
                </button>
                <button class="btn-danger" onclick="clearLogs()">清空日志</button>
            </div>

            <div id="alertContainer"></div>

            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">执行状态</div>
                    <div class="info-value">
                        <span id="statusText">未运行</span>
                        <span id="statusBadge" class="status-badge status-not-running">NOT_RUNNING</span>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-label">进程 ID</div>
                    <div class="info-value" id="pidText">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">开始时间</div>
                    <div class="info-value" id="startTimeText">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">日志文件</div>
                    <div class="info-value" id="logFileText" style="font-size: 12px; word-break: break-all;">-</div>
                </div>
            </div>

            <div class="auto-refresh">
                <label>
                    <input type="checkbox" id="autoRefresh" onchange="toggleAutoRefresh()">
                    自动刷新
                </label>
                <div class="refresh-interval">
                    <span style="font-size: 14px; color: #4a5568;">刷新间隔:</span>
                    <select id="refreshInterval" onchange="updateRefreshInterval()">
                        <option value="3">3秒</option>
                        <option value="5" selected>5秒</option>
                        <option value="10">10秒</option>
                        <option value="30">30秒</option>
                        <option value="60">60秒</option>
                    </select>
                </div>
            </div>

            <div class="log-container">
                <div class="log-content" id="logContent">等待获取日志...</div>
            </div>
        </div>
    </div>

    <script>
        let autoRefreshInterval = null;
        let refreshIntervalSeconds = 5;

        // 执行注册脚本
        async function executeScript() {
            const btn = document.getElementById('executeBtn');
            btn.innerHTML = '执行中... <span class="loading"></span>';
            
            try {
                const response = await fetch('/api/scripts/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showAlert('success', '注册脚本已成功提交执行！PID: ' + (data.pid || '获取中...'));
                    setTimeout(refreshStatus, 1000);
                } else {
                    showAlert('error', '执行失败: ' + data.message);
                }
            } catch (error) {
                showAlert('error', '请求失败: ' + error.message);
            } finally {
                btn.innerHTML = '执行注册脚本';
            }
        }

        // 刷新状态
        async function refreshStatus() {
            const btn = document.getElementById('refreshBtn');
            btn.innerHTML = '刷新中... <span class="loading"></span>';
            
            try {
                const response = await fetch('/api/scripts/register/status');
                const data = await response.json();
                
                if (data.success) {
                    updateUI(data);
                } else {
                    showAlert('error', '获取状态失败: ' + data.message);
                }
            } catch (error) {
                showAlert('error', '请求失败: ' + error.message);
            } finally {
                btn.innerHTML = '刷新状态';
            }
        }

        // 更新UI
        function updateUI(data) {
            // 更新状态
            const statusText = document.getElementById('statusText');
            const statusBadge = document.getElementById('statusBadge');
            
            const statusMap = {
                'running': { text: '运行中', class: 'status-running', badge: 'RUNNING' },
                'completed': { text: '已完成', class: 'status-completed', badge: 'COMPLETED' },
                'error': { text: '错误', class: 'status-error', badge: 'ERROR' },
                'timeout': { text: '超时', class: 'status-error', badge: 'TIMEOUT' },
                'not_running': { text: '未运行', class: 'status-not-running', badge: 'NOT_RUNNING' }
            };
            
            const status = statusMap[data.status] || statusMap['not_running'];
            statusText.textContent = status.text;
            statusBadge.textContent = status.badge;
            statusBadge.className = 'status-badge ' + status.class;
            
            // 更新其他信息
            document.getElementById('pidText').textContent = data.pid || '-';
            document.getElementById('startTimeText').textContent = data.startTime || '-';
            document.getElementById('logFileText').textContent = data.logFile || '-';
            
            // 更新日志
            const logContent = document.getElementById('logContent');
            if (data.logContent) {
                logContent.textContent = data.logContent;
                // 自动滚动到底部
                logContent.parentElement.scrollTop = logContent.parentElement.scrollHeight;
            } else {
                logContent.textContent = '暂无日志内容';
            }
        }

        // 清空日志
        function clearLogs() {
            document.getElementById('logContent').textContent = '日志已清空';
        }

        // 显示提示
        function showAlert(type, message) {
            const container = document.getElementById('alertContainer');
            const alertClass = type === 'success' ? 'alert-success' : 'alert-error';
            container.innerHTML = `<div class="alert ${alertClass}">${message}</div>`;
            
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        // 切换自动刷新
        function toggleAutoRefresh() {
            const checkbox = document.getElementById('autoRefresh');
            
            if (checkbox.checked) {
                startAutoRefresh();
            } else {
                stopAutoRefresh();
            }
        }

        // 开始自动刷新
        function startAutoRefresh() {
            refreshStatus(); // 立即刷新一次
            autoRefreshInterval = setInterval(refreshStatus, refreshIntervalSeconds * 1000);
        }

        // 停止自动刷新
        function stopAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
            }
        }

        // 更新刷新间隔
        function updateRefreshInterval() {
            const select = document.getElementById('refreshInterval');
            refreshIntervalSeconds = parseInt(select.value);
            
            const checkbox = document.getElementById('autoRefresh');
            if (checkbox.checked) {
                stopAutoRefresh();
                startAutoRefresh();
            }
        }

        // 页面加载时获取一次状态
        window.onload = function() {
            refreshStatus();
        };
    </script>
</body>
</html>
