<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>粉色后台列表页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #F9F2F5;
            padding: 30px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-title {
            font-size: 20px;
            color: #664c54;
            margin-bottom: 20px;
        }

        .search-box {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 10px #00000008;
        }

        .table-box {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 12px #0000000a;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #FDF6F8;
            color: #996677;
            padding: 14px;
            text-align: left;
            font-weight: normal;
        }

        td {
            padding: 14px;
            color: #444;
            border-bottom: 1px solid #F5E5EA;
        }

        tr:hover {
            background-color: #FDF6F8;
        }

        .btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            background: #E79AB7;
            color: #fff;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-title">用户列表管理</div>

        <div class="search-box">
            <input type="text" placeholder="请输入用户名" style="padding:8px 12px; border:1px solid #eee; border-radius:6px;">
            <button class="btn" style="margin-left:10px;">查询</button>
        </div>

        <div class="table-box">
            <table>
                <tr>
                    <th>ID</th>
                    <th>用户名</th>
                    <th>手机号</th>
                    <th>状态</th>
                    <th>创建时间</th>
                    <th>操作</th>
                </tr>
                <tr>
                    <td>1001</td>
                    <td>张三</td>
                    <td>13800138000</td>
                    <td>正常</td>
                    <td>2025-01-01</td>
                    <td><button class="btn">编辑</button></td>
                </tr>
                <tr>
                    <td>1002</td>
                    <td>李四</td>
                    <td>13900139000</td>
                    <td>正常</td>
                    <td>2025-01-02</td>
                    <td><button class="btn">编辑</button></td>
                </tr>
                <tr>
                    <td>1003</td>
                    <td>王五</td>
                    <td>13700137000</td>
                    <td>禁用</td>
                    <td>2025-01-03</td>
                    <td><button class="btn">编辑</button></td>
                </tr>
            </table>
        </div>
    </div>
</body>
</html>
