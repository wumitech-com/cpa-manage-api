server:
  port: 8081

spring:
  application:
    name: cpa-manage-api
  
  profiles:
    active: dev  # 默认使用本地开发环境配置

  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 30MB
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

# MyBatis Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath*:mapper/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# gRPC配置
grpc:
  phone-center:
    host: 10.13.16.221
    port: 28080
    default-sdk: "33"  # 默认SDK版本
    default-country-code: "US"  # 默认国家代码
    default-app-id: "com.zhiliaoapp.musically"  # 默认应用ID（TikTok）

# TT注册配置
tt-register:
  default-image: ""  # 默认镜像名称（为空时通过docker命令获取）
  default-dynamic-ip-channel: "closeli"  # 默认动态IP渠道
  default-static-ip-channel: ""  # 默认静态IP渠道

# CPA API配置
cpa-api:
  base-url: "https://cpa-api.wumitech.com"  # CPA API基础URL

# 邮箱池低库存告警（仅低于阈值时发送，正常不发送）
email-pool:
  alert:
    enabled: false
    threshold: 5000
    cron: "0 0 */2 * * ?"
    wecom-webhook: ""

# 日志配置
logging:
  level:
    com.cpa: debug
    org.springframework.web: debug
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'