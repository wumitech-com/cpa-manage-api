# CPA API配置
cpa-api:
  base-url: "http://cpa-api:8080"  # CPA API基础URL（K8s内部服务地址）

# GAID 池保底：定时查 cpa.gaid 可用量，低于阈值则调 CreateFarmTask（与 TaskSchedulerService 同源）
# US: sdk 33/34 各 ≥ us-min-per-sdk；MX/BR: 各 ≥ mx-br-min-per-sdk
cpa:
  gaid-pool-guard:
    enabled: true
    schedule-cron: "0 */15 * * * ?"
    us-min-per-sdk: 30000
    mx-br-min-per-sdk: 10000
    refill-count: 100
    refill-burst-times: 3
    refill-burst-interval-millis: 180000
    cooldown-millis: 300000
    datasource:
      url: "jdbc:mysql://10.7.43.162:3306/cpa?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true"
      username: root
      password: Wumitech
      driver-class-name: com.mysql.cj.jdbc.Driver
