message AddEmailAccountRequest {
  string account = 1;                  // 完整邮箱账号
  string password = 2;                 // 邮箱密码
  string domain = 3;                   // 邮箱域名
  basic.EmailAccountStatus status = 4; // 账号状态
  string tags = 5;                     // 标签，逗号分隔
  string remark = 6;                   // 备注
}

message AddEmailAccountResponse {
  basic.ResponseStatus response_status = 1;
  int64 id = 2; // 创建的邮箱账号ID
}

message GetEmailAccountRequest {
  repeated int64 ids = 1;                       // 账号ID列表
  repeated string accounts = 2;                 // 邮箱账号列表
  repeated string domains = 3;                  // 邮箱域名列表
  optional basic.EmailAccountStatus status = 4; // 账号状态
  repeated string tags = 5;                     // 标签过滤
  google.protobuf.Timestamp created_after = 6;  // 创建时间之后
  google.protobuf.Timestamp created_before = 7; // 创建时间之前
  uint32 offset = 8;                            // 分页偏移
  uint32 limit = 9;                             // 分页限制
}

message GetEmailAccountResponse {
  basic.ResponseStatus response_status = 1;
  repeated basic.EmailAccount email_accounts = 2;
  uint32 total_count = 3; // 总数量
}

message UpdateEmailAccountRequest {
  int64 id = 1;                 // 账号ID（可选，与account二选一）
  optional string account = 2;  // 邮箱账号（可选，与id二选一）
  optional string password = 3; // 邮箱密码
  optional basic.EmailAccountStatus status = 4; // 账号状态
  optional string tags = 5;                     // 标签
  optional string remark = 6;                   // 备注
}

message UpdateEmailAccountResponse { basic.ResponseStatus response_status = 1; }

message DeleteEmailAccountRequest {
  int64 id = 1; // 账号ID
}

message DeleteEmailAccountResponse { basic.ResponseStatus response_status = 1; }

