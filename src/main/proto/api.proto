message ResetPhoneEnvRequest {
  string biz = 1;
  string phone_id = 10;
  string phone_server_ip = 20;
  string country = 30;
  string sdk = 40;
  string image_path = 50;
  string gaid_tag = 60;
  string dynamic_ip_channel = 70;
  string static_ip_channel = 80;
}

message ResetPhoneEnvResponse {
  basic.ResponseStatus response_status = 1;
  string real_ip = 2;
}

message CreateFarmTaskRequest {
  // string sdk = 1;
  string proportion = 1;
  string country = 2;
  uint32 count = 3;
  uint32 priority = 4;
  string tag = 5;
}

message CreateFarmTaskResponse {
  basic.ResponseStatus response_status = 1;
  message TaskResult {
    string sdk = 1;
    uint32 success_count = 2; // 创建成功的任务数
  }
  repeated TaskResult task_result = 2; // 创建成功的任务结果
}

message PrioritizeFarmTaskRequest {
  string sdk = 1;
  string country = 2;
  uint32 count = 3;
  uint32 priority = 4;
  string tag = 5;
}

message PrioritizeFarmTaskResponse {
  basic.ResponseStatus response_status = 1;
  uint32 success_count = 2; // 提升优先级的任务数
}

message FarmTaskSuccessCallbackRequest {
  string gaid = 1;
  string pkg_name = 2;
}

message FarmTaskSuccessCallbackResponse {
  basic.ResponseStatus response_status = 1;
}

message FarmTaskFailedCallbackRequest {
  string gaid = 1;
  string pkg_name = 2;
}

message FarmTaskFailedCallbackResponse {
  basic.ResponseStatus response_status = 1;
}

message StartFarmTaskRequest {}

